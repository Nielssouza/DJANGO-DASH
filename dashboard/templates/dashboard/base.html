{% load static %}
{% load plotly_dash %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DS CORP | Analytics{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% plotly_header %}
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-hover: #121212;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-tertiary: rgba(255, 255, 255, 0.3);
            --glass: blur(12px);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        header.site-header {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        nav.nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }

        main {
            padding: 60px 0;
        }

        /* Dash UI Overrides for Premium Look */
        .dash-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            overflow: hidden;
        }

        .custom-dropdown .Select-control {
            background-color: #000 !important;
            border: 1px solid var(--border) !important;
            color: #fff !important;
            border-radius: 8px !important;
            padding: 4px !important;
        }

        .custom-dropdown .Select-menu-outer {
            background-color: var(--surface) !important;
            border: 1px solid var(--border-hover) !important;
            border-radius: 8px !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
        }

        /* Generic Card Style */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-hover);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #443; }

        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            nav.nav-links { display: none; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <a href="/" class="brand">
                <img src="{% static 'img/logo.png' %}" alt="DS CORP" class="brand-logo">
                <span class="brand-name">DS CORP</span>
            </a>
            <nav class="nav-links">
                <a href="/" class="{% block nav_home %}{% endblock %}">Dashboard</a>
                <a href="/pib-mundial/" class="{% block nav_pib %}{% endblock %}">Analytics</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% plotly_footer %}
</body>
</html>
